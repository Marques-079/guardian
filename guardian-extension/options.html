<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Guardian — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="hdr">
        <div class="brand">GUARDIAN</div>
        <div class="tag">SETTINGS</div>
      </header>

      <section class="card">
        <h1>Cerebras API key</h1>
        <p class="hint">
          Stored locally in your browser. Get one at
          <a href="https://cloud.cerebras.ai/" target="_blank" rel="noreferrer"
            >cloud.cerebras.ai</a
          >.
        </p>
        <label class="lbl" for="apiKey">API key</label>
        <input
          id="apiKey"
          type="password"
          placeholder="csk-..."
          autocomplete="off"
        />

        <label class="lbl" for="model">Model</label>
        <input id="model" type="text" placeholder="llama3.3-70b" />

        <div class="row">
          <button id="save" class="btn btn-primary">Save</button>
          <button id="test" class="btn">Test connection</button>
          <span id="status" class="status"></span>
        </div>
      </section>

      <section class="card">
        <h1>Approved videos</h1>
        <p class="hint">
          Videos you have already cleared (either auto-approved or argued
          through). They will not be re-checked.
        </p>
        <div class="row">
          <button id="clear" class="btn">Clear all approvals</button>
          <span id="clearStatus" class="status"></span>
        </div>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>

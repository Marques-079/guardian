<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Guardian</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #fff;
        color: #000;
        font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
        width: 280px;
      }
      .wrap {
        padding: 16px;
      }
      .brand {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.34em;
        border-bottom: 1px solid #000;
        padding-bottom: 10px;
        margin-bottom: 14px;
      }
      .row {
        font-size: 13px;
        line-height: 1.5;
        margin-bottom: 12px;
      }
      .lbl {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #000;
      }
      .val {
        font-size: 14px;
        font-weight: 600;
        margin-top: 2px;
      }
      .btn {
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 8px 12px;
        border: 1px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        width: 100%;
        margin-top: 6px;
      }
      .btn:hover {
        background: #000;
        color: #fff;
      }
      .btn-primary {
        background: #000;
        color: #fff;
      }
      .btn-primary:hover {
        background: #fff;
        color: #000;
      }
      .status {
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        margin-top: 8px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">GUARDIAN</div>
      <div class="row">
        <div class="lbl">Approved videos</div>
        <div class="val" id="count">—</div>
      </div>
      <div class="row">
        <div class="lbl">API key</div>
        <div class="val" id="apiKey">—</div>
      </div>
      <button id="clear" class="btn">Clear approvals</button>
      <button id="settings" class="btn btn-primary">Open settings</button>
      <div id="status" class="status"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
